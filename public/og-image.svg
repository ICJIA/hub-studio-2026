  <!-- Tagline -->
  <text x="72" y="432" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="400" fill="#94A3B8">Write in plain language, preview exactly as published,</text>
  <text x="72" y="464" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="400" fill="#94A3B8">and ship with built-in editorial review.</text>

